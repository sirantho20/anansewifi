<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="refresh" content="2; url=$(link-redirect)">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Ananse WiFi — You are online</title>
    <style>
      html { min-height: 100%; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0c1424;
        color: #e8ecf4;
        font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-text-size-adjust: 100%;
      }
      .shell {
        box-sizing: border-box;
        min-height: 100vh;
        display: -webkit-box;
        display: -ms-flexbox;
        display: flex;
        -webkit-box-align: center;
        -ms-flex-align: center;
        align-items: center;
        -webkit-box-pack: center;
        -ms-flex-pack: center;
        justify-content: center;
        padding: max(1.25rem, env(safe-area-inset-top, 0px)) max(1.25rem, env(safe-area-inset-right, 0px)) max(1.25rem, env(safe-area-inset-bottom, 0px)) max(1.25rem, env(safe-area-inset-left, 0px));
      }
      .card {
        width: 100%;
        max-width: 420px;
        padding: 2rem 1.5rem;
        border-radius: 14px;
        background: #1a2438;
        border: 1px solid rgba(255, 255, 255, 0.14);
      }
      .brand { margin-bottom: 1.1rem; text-align: center; }
      .brand strong { display: block; font-size: 1.35rem; font-weight: 700; color: #fff; }
      .brand span { font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(232, 236, 244, 0.55); }
      h1 { font-size: 1.2rem; font-weight: 600; text-align: center; margin-bottom: 0.25rem; color: #fff; }
      .sub { text-align: center; font-size: 0.88rem; color: rgba(232, 236, 244, 0.68); margin-bottom: 1rem; }
      .msg { text-align: center; font-size: 0.88rem; margin-bottom: 1rem; padding: 0.65rem; border-radius: 10px; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.08); }
      .foot { text-align: center; margin-top: 1.25rem; font-size: 0.72rem; color: rgba(232, 236, 244, 0.38); }
      a { color: #f0c56c; }
    </style>
    <link rel="stylesheet" href="hotspot.css">
    <script>
        function startClock() {
$(if popup == 'true')
            open('$(link-status)', 'hotspot_status', 'toolbar=0,location=0,directories=0,status=0,menubars=0,resizable=1,width=290,height=200');
$(endif)
            location.href = unescape('$(link-redirect-esc)');
        }
    </script>
</head>
<body onLoad="startClock()">
    <div class="shell">
        <div class="card">
            <div class="brand">
                <strong>Ananse WiFi</strong>
                <span>Success</span>
            </div>
            <h1>You are logged in</h1>
            <p class="sub">Taking you online. If nothing happens, use the button below.</p>
            <p class="msg"><a href="$(link-redirect)">Continue to the internet</a></p>
            <p class="foot">This page closes automatically when redirect is allowed.</p>
        </div>
    </div>
</body>
</html>
