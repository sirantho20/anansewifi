{% extends "base.html" %}
{% block content %}
<h1>Captive Portal Login</h1>
<div class="card">
  <form method="post">
    {% csrf_token %}
    <label>Mobile or Username</label>
    <input type="text" name="identity" value="{{ identity|default:'' }}" placeholder="+233XXXXXXXXX or username" required>
    <label>Voucher Code</label>
    <input type="text" name="voucher_code" placeholder="voucher code" required>
    <label>MAC Address</label>
    <input type="text" name="mac_address" placeholder="AA:BB:CC:DD:EE:FF">
    <button type="submit">Redeem and Connect</button>
  </form>
</div>
{% endblock %}
