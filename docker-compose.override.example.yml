# Copy to docker-compose.override.yml (gitignored) to bind-mount the repo into `web` for local live reload.
# Docker Compose merges this with docker-compose.yml automatically when the file is present.
#   cp docker-compose.override.example.yml docker-compose.override.yml
services:
  web:
    volumes:
      - .:/app
    # Bind mount hides the image’s collected static; run collectstatic on each `web` start when changing static/ or first boot.
    environment:
      RUN_COLLECTSTATIC: "1"
