services:
  web:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    command: celery -A ananseWifi worker --loglevel=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    command: celery -A ananseWifi beat --loglevel=INFO
    depends_on:
      redis:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  radius:
    build: ./radius
    env_file:
      - .env
    environment:
      RADIUS_DB_HOST: ${RADIUS_DB_HOST:-db}
      RADIUS_DB_PORT: ${RADIUS_DB_PORT:-5432}
      RADIUS_DB_NAME: ${RADIUS_DB_NAME:-ananse_wifi}
      RADIUS_DB_USER: ${RADIUS_DB_USER:-ananse}
      RADIUS_DB_PASSWORD: ${RADIUS_DB_PASSWORD:-ananse}
      RADIUS_SQL_DIALECT: ${RADIUS_SQL_DIALECT:-postgresql}
      RADIUS_CLIENT_SECRET: ${RADIUS_CLIENT_SECRET:-ananse-radius-secret}
    entrypoint: ["/usr/local/bin/ananse-radius-entrypoint.sh"]
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    healthcheck:
      test: ["CMD-SHELL", "pgrep freeradius >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles

volumes:
  postgres_data:
  redis_data:
  static_volume:
