services:
  web:
    image: ananse-wifi:local
    build: .
    env_file:
      - .env
    environment:
      LOG_NAMESPACE: base.django
    labels:
      ananse.log.namespace: base.django
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ananse-wifi:local
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
      LOG_NAMESPACE: base.django.celery.worker
    labels:
      ananse.log.namespace: base.django.celery.worker
    command: celery -A ananseWifi worker --loglevel=INFO
    depends_on:
      redis:
        condition: service_healthy

  beat:
    image: ananse-wifi:local
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
      LOG_NAMESPACE: base.django.celery.beat
    labels:
      ananse.log.namespace: base.django.celery.beat
    command: celery -A ananseWifi beat --loglevel=INFO
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7
    labels:
      ananse.log.namespace: base.redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FreeRADIUS SQL uses the same DATABASE_URL as Django: radius/entrypoint.sh parses it into RADIUS_DB_* before rendering mods. Do not duplicate RADIUS_DB_* in compose.
  radius:
    build: ./radius
    env_file:
      - .env
    environment:
      RADIUS_SQL_DIALECT: ${RADIUS_SQL_DIALECT:-postgresql}
      RADIUS_CLIENT_SECRET: ${RADIUS_CLIENT_SECRET:-ananse-radius-secret}
      RADIUS_NAS_CLIENT_IP: ${RADIUS_NAS_CLIENT_IP:-}
      RADIUS_NAS_CLIENT_SECRET: ${RADIUS_NAS_CLIENT_SECRET:-}
      LOG_NAMESPACE: base.radius
    labels:
      ananse.log.namespace: base.radius
    entrypoint: ["/usr/local/bin/ananse-radius-entrypoint.sh"]
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    healthcheck:
      test: ["CMD-SHELL", "pgrep freeradius >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      web:
        condition: service_started

  nginx:
    # Config is baked in (see nginx/Dockerfile) so deploys do not bind-mount a file onto /etc/nginx/conf.d/default.conf.
    # /static/ is proxied to Gunicorn+WhiteNoise (see nginx/default.conf); no shared static volume.
    build: ./nginx
    environment:
      LOG_NAMESPACE: base.nginx
    labels:
      ananse.log.namespace: base.nginx
    depends_on:
      web:
        condition: service_started
    # Host port: default 18080 to avoid "port already allocated" with Coolify, IDEs, or other stacks on 8080.
    # Override in .env: NGINX_HTTP_PORT=8080
    ports:
      - "${NGINX_HTTP_PORT:-18080}:80"

volumes:
  redis_data:
